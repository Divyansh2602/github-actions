name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Isometric 3D skyline of the last year of contributions,
      # themed to the cyan/void palette (see conf/3d-contrib-settings.json).
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: conf/3d-contrib-settings.json

      - name: Commit & push generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib/
          git commit -m "chore: regenerate 3D contribution graph" || echo "no changes"
          git push
